services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: clownarena
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d clownarena"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key}
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/clownarena
      ASYNC_DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/clownarena
      REDIS_URL: redis://redis:6379/0
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "8000:8000"
    command: ["/bin/sh", "-lc", "alembic upgrade head && python -m uvicorn apps.api.main:app --host 0.0.0.0 --port 8000"]

  judge:
    build:
      context: .
      dockerfile: apps/judge/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key}
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/clownarena
      ASYNC_DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/clownarena
      REDIS_URL: redis://redis:6379/0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "3000:3000"

volumes:
  postgres_data:
